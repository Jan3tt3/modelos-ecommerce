<h2>Mi carrito</h2>

{% if cart.products.all %}
  <ul>
    {% for product in cart.products.all %}
      <li>
        {{ product.name }} - ${{ product.price }}
        <a href="{% url 'remove_from_cart' product.id %}">Quitar</a>
      </li>
    {% endfor %}
  </ul>
{% else %}
  <p>Tu carrito está vacío</p>
{% endif %}

<a href="/products/">Seguir comprando</a>
