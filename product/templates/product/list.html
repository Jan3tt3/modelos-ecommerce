{% extends 'base.html' %}

{% block content %}

<h2>Productos</h2>

<ul>
{% for product in products %}
    <li>
        {{ product.name }} - ${{ product.price }}

        <!-- ✅ FORMULARIO CORRECTO -->
        <form method="post" action="{% url 'add_to_cart' product.id %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Agregar</button>
        </form>

    </li>
{% endfor %}
</ul>

{% endblock %}
