<h2>Mis direcciones</h2>

<a href="{% url 'address_create' %}">Nueva dirección</a>

<ul>
{% for address in addresses %}
    <li>
        {{ address.street }}, {{ address.city }}

        <a href="{% url 'address_detail' address.id %}">Ver</a>
        <a href="{% url 'address_update' address.id %}">Editar</a>

        <form method="post" action="{% url 'address_delete' address.id %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit">Eliminar</button>
        </form>
    </li>
{% endfor %}
</ul>
